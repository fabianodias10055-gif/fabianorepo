name: UE5 YouTube Daily Report

on:
  schedule:
    - cron: "0 11 * * *"  # 8am Sao Paulo (UTC-3)
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discord-feedback-bot
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_WEBHOOK_USERNAME: UE5 Daily Report
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Send UE5 YouTube report
        run: python scripts/youtube_ue5_report.py
