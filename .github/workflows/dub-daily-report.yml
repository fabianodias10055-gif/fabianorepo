name: Dub Daily Top 5 Report

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discord-feedback-bot
    env:
      DUB_API_KEY: ${{ secrets.DUB_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_DM_USER_ID: ${{ secrets.DISCORD_DM_USER_ID }}
      DUB_TIMEZONE: America/Sao_Paulo
      DUB_REPORT_LIMIT: "5"
      DISCORD_WEBHOOK_USERNAME: Dub Daily Report
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-dotenv discord.py

      - name: Send last 24 hours report
        run: python scripts/dub_daily_report.py --window last-24h
